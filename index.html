<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme Pizza Corp</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./js/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kavoon&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karma:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Cardápio</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero">
    
            <div class="hero_text">
                <h2>Sabor explosivo</h2>
                <h1>Acme Pizza Corp</h1>
                <span>Av. Queijo Quente, 123.</span>
            </div>
    
            <div class="queijo">
                <img src="./img/burrata_home.svg" alt="Imagem de queijo Burrata">
            </div>
    
            <div class="pizza_principal">
                <img src="./img/pizza_home.svg" alt="Imagem de uma pizza">
            </div>
    
            <div class="tomate">
                <img src="./img/tomate_home.svg" alt="Imagem de tomates">
            </div>  

            <div class="listras">
                <div class="cor1"> </div>
                <div class="cor2"> </div>
                <div class="cor3"> </div>

            </div>
    
        </section>

        <section class="cardapio">

            <div class="cards">
                <div class="card_sabor">
                    <span>Pizzas Salgadas</span>
                    <img src="./img/pizzas_doces.png" alt="">

                </div>

                <div class="card_sabor">
                    <span>Todos os Sabores</span>
                    <img src="./img/pizzas_mistas.png" alt="">
                </div>

                <div class="card_sabor">
                    <span>Pizzas Salgadas</span>
                    <img src="./img/pizzas_salgadas.png" alt="">
                </div>

            </div>


        </section>
    </main>
</body>
</html>
